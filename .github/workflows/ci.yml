name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Smoke-test the built CLI (--help)
        run: node dist/cli.js --help | grep -q "Ormuz"
      - name: Smoke-test the built CLI (--version)
        run: test "$(node dist/cli.js --version)" = "$(node -p "require('./package.json').version")"
      - name: Smoke-test the built CLI is directly executable
        run: ./dist/cli.js --help | grep -q "Ormuz"
